<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>

    <!-- Fond dégradé sombre -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#22222e"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </radialGradient>

    <!-- Lueur sur les barres -->
    <filter id="barGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Fond cercle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)"/>

  <!-- Anneau border beige -->
  <circle cx="50" cy="50" r="47.5" fill="none"
    stroke="#ebeab0" stroke-width="1.8" opacity="0.75"/>

  <!--
    5 barres centrees sur cx=50, cy=50
    Largeur barre = 8, gap = 4 → total = 56 → depart x = 22
    Positions x : 22 / 34 / 46 / 58 / 70
    Hauteurs    : 20 / 36 / 52 / 36 / 20
    y = 50 - height/2
  -->

  <!-- Barre 1 — extreme gauche (h=20) x=22 -->
  <rect x="22" y="40" width="8" height="20" rx="4"
        fill="#c8d8f0" opacity="0.55" filter="url(#barGlow)"/>

  <!-- Barre 2 — gauche (h=36) x=34 -->
  <rect x="34" y="32" width="8" height="36" rx="4"
        fill="#ebeab0" opacity="0.78" filter="url(#barGlow)"/>

  <!-- Barre 3 — centrale (h=52) x=46 -->
  <rect x="46" y="24" width="8" height="52" rx="4"
        fill="#ebeab0" opacity="1" filter="url(#barGlow)"/>

  <!-- Barre 4 — droite (h=36) x=58 -->
  <rect x="58" y="32" width="8" height="36" rx="4"
        fill="#ebeab0" opacity="0.78" filter="url(#barGlow)"/>

  <!-- Barre 5 — extreme droite (h=20) x=70 -->
  <rect x="70" y="40" width="8" height="20" rx="4"
        fill="#c8d8f0" opacity="0.55" filter="url(#barGlow)"/>

</svg>
